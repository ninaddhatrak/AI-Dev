version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: harm-tracker-postgres
    environment:
      POSTGRES_DB: harm_tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker_pw
    ports:
      - "5433:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker -d harm_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
